{% extends 'base.html' %}

{% block title %}Dodaj Vjezbu{% endblock %}

{% block extra_css %}
<style>
    :root {
        --dark-bg: #1a1a2e;
        --card-bg: #16213e;
        --accent-blue: #0984e3;
        --text-light: #f5f5f5;
        --text-muted: #b2bec3;
        --border-color: #2d3a5e;
    }

    .form-wrapper {
        background: var(--dark-bg);
        min-height: 60vh;
        border-radius: 12px;
        margin: -24px -12px;
        padding: 40px 30px;
        display: flex;
        justify-content: center;
    }

    .form-container {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 32px;
        width: 100%;
        max-width: 560px;
    }

    .form-container h1 {
        color: var(--text-light);
        font-size: 1.4rem;
        font-weight: 700;
        margin: 0 0 6px 0;
    }

    .form-subtitle {
        color: var(--text-muted);
        font-size: 0.85rem;
        margin-bottom: 24px;
    }

    .form-field {
        margin-bottom: 16px;
    }

    .form-field label {
        display: block;
        color: var(--text-muted);
        font-size: 0.85rem;
        margin-bottom: 6px;
        font-weight: 600;
    }

    .form-field input,
    .form-field textarea {
        width: 100%;
        padding: 12px 14px;
        background: var(--dark-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-light);
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.2s;
        box-sizing: border-box;
    }

    .form-field input:focus,
    .form-field textarea:focus {
        border-color: var(--accent-blue);
    }

    .form-field textarea {
        resize: vertical;
        min-height: 80px;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .form-actions {
        display: flex;
        gap: 10px;
        margin-top: 24px;
    }

    .btn-submit {
        background: var(--accent-blue);
        color: white;
        border: none;
        padding: 12px 28px;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s;
    }

    .btn-submit:hover {
        background: #0773c5;
    }

    .btn-back {
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-muted);
        padding: 12px 28px;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        transition: all 0.2s;
    }

    .btn-back:hover {
        border-color: var(--text-muted);
        color: var(--text-light);
    }
</style>
{% endblock %}

{% block content %}
<div class="form-wrapper">
    <div class="form-container">
        <h1>Dodaj Vjezbu</h1>
        <p class="form-subtitle">Dodajte vjezbu za dnevni plan.</p>

        <form method="POST" action="{% url 'addexercise' daily_plan.pk %}">
            {% csrf_token %}

            <div class="form-field">
                <label for="name">Naziv vjezbe</label>
                <input type="text" name="name" id="name" placeholder="npr. Bench Press" required>
            </div>

            <div class="form-field">
                <label for="description">Opis</label>
                <textarea name="description" id="description" placeholder="Opisite pravilnu formu, napomene..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-field">
                    <label for="sets">Broj serija</label>
                    <input type="number" name="sets" id="sets" placeholder="npr. 4" min="1" required>
                </div>
                <div class="form-field">
                    <label for="reps">Broj ponavljanja</label>
                    <input type="number" name="reps" id="reps" placeholder="npr. 12" min="1" required>
                </div>
            </div>

            <div class="form-field">
                <label for="video_url">Video URL (opcionalno)</label>
                <input type="url" name="video_url" id="video_url" placeholder="https://youtube.com/watch?v=...">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Dodaj Vjezbu</button>
                <a href="{% url 'detailplan' daily_plan.plan.pk %}" class="btn-back">Natrag</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
